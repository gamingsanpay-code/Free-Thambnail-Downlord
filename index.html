<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- SEO -->
  <title>YouTube Thumbnail Downloader Free</title>
  <meta name="description" content="Download YouTube thumbnails in HD quality for free. Fast and easy tool.">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      text-align: center;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 0;
    }

    .container {
      padding: 40px 20px;
    }

    h1 {
      color: #38bdf8;
    }

    input {
      width: 80%;
      max-width: 400px;
      padding: 12px;
      border-radius: 8px;
      border: none;
      margin-top: 15px;
    }

    button {
      padding: 12px 20px;
      margin-top: 15px;
      border: none;
      border-radius: 8px;
      background: #38bdf8;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #0ea5e9;
    }

    img {
      margin-top: 20px;
      width: 90%;
      max-width: 500px;
      border-radius: 10px;
    }

    .download-btn {
      display: none;
      margin-top: 15px;
      background: #22c55e;
      color: white;
    }

    footer {
      margin-top: 40px;
      font-size: 12px;
      color: gray;
    }

  </style>
</head>

<body>

  <div class="container">
    <h1>🎬 Thumbnail Downloader</h1>
    <p>Paste YouTube video link below</p>

    <input type="text" id="url" placeholder="https://youtube.com/watch?v=...">
    <br>

    <button onclick="getThumbnail()">Get Thumbnail</button>

    <br>
    <img id="thumb" src="">

    <br>
    <a id="downloadLink" download>
      <button class="download-btn" id="downloadBtn">⬇ Download HD</button>
    </a>
  </div>

  <footer>
    © 2026 Free Tool | Made by You 😎
  </footer>

  <script>
    function getThumbnail() {
      let url = document.getElementById("url").value;

      if (!url.includes("v=")) {
        alert("Invalid YouTube URL!");
        return;
      }

      let videoId = url.split("v=")[1].split("&")[0];

      let hd = "https://img.youtube.com/vi/" + videoId + "/maxresdefault.jpg";

      document.getElementById("thumb").src = hd;

      let downloadLink = document.getElementById("downloadLink");
      downloadLink.href = hd;

      document.getElementById("downloadBtn").style.display = "inline-block";
    }
  </script>

</body>
</html>
