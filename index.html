<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Thumbnail Hub</title>
<meta name="description" content="Download YouTube thumbnails & free templates">

<style>
body {font-family:sans-serif;background:#0f172a;color:white;text-align:center;}
.container {padding:20px;}
input {padding:10px;width:80%;max-width:400px;}
button {padding:10px;margin:5px;border:none;border-radius:6px;cursor:pointer;}
img {width:90%;max-width:400px;margin-top:15px;border-radius:10px;}
.gallery img {width:150px;margin:10px;}
</style>
</head>

<body>

<div class="container">
<h1>🎬 Thumbnail Hub</h1>

<!-- Downloader -->
<h2>Download YouTube Thumbnail</h2>
<input id="url" placeholder="Paste YouTube link">
<br>
<button onclick="getThumb()">Get</button>
<br>
<img id="thumb">
<br>
<a id="dl" download><button>Download</button></a>

<hr>

<!-- Upload -->
<h2>Upload Your Thumbnail</h2>
<input type="file" id="file">
<br>
<button onclick="upload()">Upload</button>

<hr>

<!-- Gallery -->
<h2>Free Thumbnails</h2>
<div id="gallery" class="gallery"></div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js"></script>

<script>
// 🔴 PASTE YOUR FIREBASE CONFIG HERE
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID",
  storageBucket: "YOUR_BUCKET",
  messagingSenderId: "YOUR_ID",
  appId: "YOUR_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const storage = firebase.storage();

// Downloader
function getThumb(){
 let url=document.getElementById("url").value;
 let id=url.split("v=")[1]?.split("&")[0];
 let img=`https://img.youtube.com/vi/${id}/maxresdefault.jpg`;
 document.getElementById("thumb").src=img;
 document.getElementById("dl").href=img;
}

// Upload
function upload(){
 let file=document.getElementById("file").files[0];
 let ref=storage.ref("thumbs/"+file.name);
 ref.put(file).then(()=>{
   alert("Uploaded!");
   loadGallery();
 });
}

// Load Gallery
function loadGallery(){
 let div=document.getElementById("gallery");
 div.innerHTML="";
 storage.ref("thumbs").listAll().then(res=>{
   res.items.forEach(item=>{
     item.getDownloadURL().then(url=>{
       let img=document.createElement("img");
       img.src=url;
       img.onclick=()=>window.open(url);
       div.appendChild(img);
     });
   });
 });
}

loadGallery();
</script>

</body>
</html>
