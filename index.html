<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- SEO -->
  <title>YouTube Thumbnail Downloader HD</title>
  <meta name="description" content="Download YouTube thumbnails in HD, SD, and more for free. Fast & mobile-friendly.">

  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      text-align: center;
      margin: 0;
      transition: 0.3s;
    }

    .dark {
      background: #0f172a;
      color: white;
    }

    .light {
      background: #f1f5f9;
      color: black;
    }

    .container {
      padding: 40px 20px;
    }

    input {
      width: 80%;
      max-width: 400px;
      padding: 12px;
      border-radius: 8px;
      border: none;
      margin-top: 15px;
    }

    button {
      padding: 10px 18px;
      margin: 8px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    .main-btn {
      background: #38bdf8;
      color: black;
    }

    .download {
      background: #22c55e;
      color: white;
      display: none;
    }

    .toggle {
      position: absolute;
      top: 10px;
      right: 10px;
      background: #eab308;
    }

    img {
      margin-top: 20px;
      width: 90%;
      max-width: 500px;
      border-radius: 10px;
    }

    .quality-btns {
      margin-top: 15px;
    }
  </style>
</head>

<body class="dark">

  <button class="toggle" onclick="toggleMode()">🌙/☀</button>

  <div class="container">
    <h1>🎬 Thumbnail Downloader PRO</h1>
    <p>Paste YouTube video link</p>

    <input type="text" id="url" placeholder="https://youtube.com/watch?v=...">
    <br>

    <button class="main-btn" onclick="getThumbnail()">Get Thumbnail</button>

    <div class="quality-btns">
      <button onclick="setQuality('maxresdefault')">HD</button>
      <button onclick="setQuality('hqdefault')">SD</button>
      <button onclick="setQuality('mqdefault')">MQ</button>
    </div>

    <img id="thumb">

    <br>
    <a id="downloadLink" download>
      <button class="download" id="downloadBtn">⬇ Download</button>
    </a>
  </div>

  <script>
    let videoId = "";
    let quality = "maxresdefault";

    function getThumbnail() {
      let url = document.getElementById("url").value;

      if (!url.includes("v=")) {
        alert("Invalid URL!");
        return;
      }

      videoId = url.split("v=")[1].split("&")[0];
      updateImage();
    }

    function setQuality(q) {
      quality = q;
      if (videoId) updateImage();
    }

    function updateImage() {
      let imgUrl = "https://img.youtube.com/vi/" + videoId + "/" + quality + ".jpg";

      document.getElementById("thumb").src = imgUrl;
      document.getElementById("downloadLink").href = imgUrl;
      document.getElementById("downloadBtn").style.display = "inline-block";
    }

    function toggleMode() {
      let body = document.body;
      body.classList.toggle("dark");
      body.classList.toggle("light");
    }
  </script>

</body>
</html>
